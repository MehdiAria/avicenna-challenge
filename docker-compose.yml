services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: avicenna
      POSTGRES_USER: avicenna
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avicenna"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: avicenna
      POSTGRES_USER: avicenna
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: